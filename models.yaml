# Реестр LLM-моделей для бенчмарка
#
# Формат записи:
#   - id: <slug>          # короткий стабильный идентификатор, используется в именах файлов прогонов
#     name: <полное имя>  # человекочитаемое имя
#     provider: <org>     # провайдер (Anthropic, OpenAI, Google, Zhipu, ...)
#     version: <строка>   # версия/релиз модели
#     released: <YYYY-MM-DD>  # дата выхода (если известна)
#     notes: <строка>     # необязательные заметки
#
# При добавлении новой модели просто допиши запись в конец списка.
# id должен быть уникальным и стабильным — на него ссылаются файлы в runs/.
# Если у модели выходит новая версия (например, claude-sonnet-4.5 → 4.6),
# создавай новый id, не перезаписывай старый — иначе история прогонов смешается.

models: []
  # Примеры (раскомментируй и заполни при первом прогоне):
  # - id: claude-sonnet-4.5
  #   name: Claude Sonnet 4.5
  #   provider: Anthropic
  #   version: sonnet-4.5
  #   released: 2025-09-29
  #   notes: Использовался в Windsurf IDE
