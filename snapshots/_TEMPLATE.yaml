---
# Front matter снапшота проекта на волну.
# Один файл на проект в папке волны: snapshots/<wave>/<project>.yaml

project: <gymprogress|voicemind|wishlot>
wave: wave-NN-YYYYQn
captured_at: 2026-06-21
---

# Git-тег, поставленный в проекте для этой волны.
# Команда для воспроизведения: git checkout <git_tag>
git_tag: benchmark-wave-NN

# Commit hash, на котором стоит тег. Для аудита и сверки.
commit_hash: "<40-символьный SHA>"

# Краткая сводка состояния проекта на момент снапшота.
# Что нового с прошлой волны (если не первая волна).
# Какие крупные изменения могут повлиять на задачи.
summary: |
  Первая волна. Базовое состояние проекта.

# Известные проблемы / техдолг на момент снапшота (кратко).
# Помогает модели понимать, что уже известно, а что — нет.
known_issues:
  - "Краткое описание известной проблемы 1"
  - "Краткое описание известной проблемы 2"

# Ссылки на ключевые документы проекта (модель должна прочитать перед задачей).
key_docs:
  - path: C:/projects/<Project>/AGENTS.md
    note: Правила проекта для AI-агента
  - path: C:/projects/<Project>/docs/DESIGN_SYSTEM.md
    note: Дизайн-система
