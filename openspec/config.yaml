schema: spec-driven

context: |
  Benchmark — репозиторий для сравнения LLM-моделей на задачах из живых Android-проектов
  (GymProgress, VoiceMind, Wishlot — Kotlin/Compose/Room). Кода приложения здесь нет:
  только текстовые артефакты — задачи, снапшоты волн, прогоны моделей, leaderboard.
  OpenSpec-артефакты (proposal, design, tasks, specs) — на русском,
  кроме normative keywords MUST/SHALL/MUST NOT и заголовков сценариев WHEN/THEN/AND.
  Код и идентификаторы — на английском, как в проектах-референсах.

rules:
  specs:
    - Текст requirements и сценариев — русский
    - В каждом ### Requirement: обязательно MUST, SHALL или MUST NOT (не «ДОЛЖЕН») — иначе validate падает
    - Main spec (openspec/specs/): секции ## Purpose и ## Requirements
    - Delta spec (openspec/changes/*/specs/): ## ADDED/MODIFIED/REMOVED Requirements
    - Каждый requirement — минимум один #### Scenario: с WHEN/THEN
    - Capability = подсистема бенчмарк-системы (task-format, run-protocol, wave-snapshot, leaderboard), не отдельная фича
    - После правок запускать openspec validate --all
  proposal:
    - Русский язык, кратко: что и зачем
  design:
    - Русский язык: как реализовать, trade-offs
  tasks:
    - Русский язык, чекбоксы - [ ] / - [x]
